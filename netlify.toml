[build]
  publish = "."
  command = "echo 'Static site — no build step'"

[functions]
  node_bundler = "esbuild"

# Meta ads report → Telegram, 3x daily in Eastern time
# 9am ET → 13:00 UTC (EDT), 1pm ET → 17:00 UTC, 9pm ET → 01:00 UTC (+1d)
[functions."daily-report"]
  schedule = "0 13,17,1 * * *"

# Morning untouched-leads follow-up, 8am Eastern (12:00 UTC EDT)
# Lists every 'new' or 'partial' lead >3h old with Telegram quick-action buttons
[functions."follow-up-reminder"]
  schedule = "0 12 * * *"

# Morning briefing at 6am Eastern (10:00 UTC EDT)
# Today's jobs + tomorrow preview + weekly pipeline + prep flags
[functions."morning-briefing"]
  schedule = "0 10 * * *"

[build.environment]
  NODE_VERSION = "20"

# ============================================================
# SECURITY HEADERS
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ============================================================
# CACHE
# ============================================================
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================================
# REDIRECTS
# ============================================================
# www → non-www
[[redirects]]
  from = "https://www.toromovers.net/*"
  to = "https://toromovers.net/:splat"
  status = 301
  force = true

# /crm → /crm.html
[[redirects]]
  from = "/crm"
  to = "/crm.html"
  status = 200

# /quote → /quote.html
[[redirects]]
  from = "/quote"
  to = "/quote.html"
  status = 200

# Legacy SEO — old Shopify-style URL buckets from the previous site.
# Placed BEFORE the generic .html strip so .html and non-.html forms
# both resolve in a single hop. See GSC export 2026-04-09.
