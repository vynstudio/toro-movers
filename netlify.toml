[build]
  publish = "."
  command = "echo 'Static site — no build step'"

[functions]
  node_bundler = "esbuild"

# Meta ads report → Telegram, 3x daily in Eastern time
# 9am ET → 13:00 UTC (EDT), 1pm ET → 17:00 UTC, 9pm ET → 01:00 UTC (+1d)
[functions."daily-report"]
  schedule = "0 13,17,1 * * *"

# Morning untouched-leads follow-up, 8am Eastern (12:00 UTC EDT)
# Lists every 'new' or 'partial' lead >3h old with Telegram quick-action buttons
[functions."follow-up-reminder"]
  schedule = "0 12 * * *"

# Morning briefing at 6am Eastern (10:00 UTC EDT)
# Today's jobs + tomorrow preview + weekly pipeline + prep flags
[functions."morning-briefing"]
  schedule = "0 10 * * *"

# Vyn Studio ops bot daily brief at 8am Eastern (12:00 UTC EDT)
# Cross-client status + open action items to @Vynstudio_bot
[functions."vyn-bot-daily"]
  schedule = "0 12 * * *"

# Escalating move-day reminders — every 15 min
# T-3h first, then every 30m to T-1h, then every 15m in the final hour.
# Idempotent via lead.reminders_sent[]. Fires only for booked leads with
# a valid move_date + move_time (ET).
# Every 30 min (was */15 — halved to cut Netlify function invocations by 1,440/mo).
# Trade-off: the T-0:15 and T-0:45 slots in move-reminders.js are skipped;
# crew still gets T-3h, T-2:30, T-2, T-1:30, T-1, T-0:30, and T-0.
[functions."move-reminders"]
  schedule = "*/30 * * * *"

[build.environment]
  NODE_VERSION = "20"

# ============================================================
# SECURITY HEADERS
# ============================================================
# CSP notes:
# - 'unsafe-inline' is required because quote.html / lp.html / index.html
#   ship large inline <style> and <script> blocks. Switching to nonces would
#   require rewriting every inline block + a build step.
# - Allowed third parties: Meta Pixel (connect.facebook.net,
#   *.facebook.com), GA4 / GTM (googletagmanager.com, *.google-analytics.com),
#   Stripe (js.stripe.com, checkout.stripe.com, m.stripe.network,
#   api.stripe.com).
# - Test after any change: load /quote, submit a lead, run through Stripe
#   checkout, and watch the browser console for CSP violations.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://connect.facebook.net https://www.googletagmanager.com https://js.stripe.com https://m.stripe.network https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.facebook.com https://*.facebook.com https://*.google-analytics.com https://*.googletagmanager.com https://*.google.com https://t.me; connect-src 'self' https://*.facebook.net https://*.facebook.com https://*.google-analytics.com https://*.googletagmanager.com https://*.stripe.com https://api.stripe.com https://m.stripe.network https://telegram.org; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com https://m.stripe.network; font-src 'self' data:; form-action 'self' https://checkout.stripe.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"

# Noindex CRM paths so Google never indexes internal ops UI even if a URL
# leaks. CRM functionality is already gated server-side by CRM_PASSWORD in
# crm.js, so this is belt-and-suspenders on the SEO side.
[[headers]]
  for = "/crm"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/crm.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/crm-assets/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ============================================================
# CACHE
# ============================================================
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ============================================================
# REDIRECTS
# ============================================================
# Internal strategy / brand / analytics docs kept in the repo for reference
# but MUST NOT serve publicly. Return 404 for each. Keeping the files in
# git lets the team edit them locally without shipping to prod.
[[redirects]]
  from = "/ads-google.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/ads-meta.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/analytics-dashboard.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/brand-identity.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/personas.md"
  to = "/404.html"
  status = 404
  force = true

# Old design proposals — kept in repo for history, hidden from the public
# site. robots.txt already Disallow:s /proposals/ but that's crawler-only;
# this force-404 blocks direct access too.
[[redirects]]
  from = "/proposals/*"
  to = "/404.html"
  status = 404
  force = true

# www → non-www
[[redirects]]
  from = "https://www.toromovers.net/*"
  to = "https://toromovers.net/:splat"
  status = 301
  force = true

# /crm → /crm.html
[[redirects]]
  from = "/crm"
  to = "/crm.html"
  status = 200

# /quote → /quote.html
[[redirects]]
  from = "/quote"
  to = "/quote.html"
  status = 200

# /privacy → /privacy.html
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

