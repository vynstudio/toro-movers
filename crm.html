<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Toro Movers — Leads</title>
<meta name="theme-color" content="#C8102E">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="assets/img/icon.png">
<link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png">

<style>
:root{
  --red:#C8102E; --red-dark:#A00C24; --charcoal:#0a0a0a;
  --white:#fff; --bg:#f5f5f7; --card:#fff; --line:#e7e7eb; --mute:#6b7280;
  --green:#16a34a; --amber:#f59e0b; --blue:#2563eb;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--charcoal);line-height:1.4;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none;padding:0}
a{color:inherit;text-decoration:none}

/* ===== LOGIN ===== */
.login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;z-index:1000}
.login-box{background:#fff;border-radius:16px;padding:36px 32px;max-width:360px;width:88%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;font-weight:900;font-size:24px;letter-spacing:-.3px;margin-bottom:4px}
.login-logo span{color:var(--red)}
.login-sub{text-align:center;font-size:13px;color:var(--mute);margin-bottom:22px}
.login input{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:10px;font-size:15px}
.login input:focus{outline:none;border-color:var(--red)}
.login button{width:100%;padding:14px;background:var(--red);color:#fff;border-radius:12px;font-weight:700;font-size:15px}
.err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ===== APP ===== */
.app{max-width:680px;margin:0 auto;min-height:100vh;min-height:100dvh;background:var(--card);display:flex;flex-direction:column}
@media(min-width:680px){.app{margin-top:20px;margin-bottom:20px;min-height:calc(100vh - 40px);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.08);overflow:hidden}}

/* Header */
.hdr{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-weight:800;font-size:20px;letter-spacing:-.4px}
.hdr-title span{color:var(--red)}
.hdr-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--mute)}
.hdr-stat{font-weight:700}
.hdr-stat.red{color:var(--red)}
.refresh{font-size:18px;color:var(--mute);padding:4px 8px}
.refresh:active{color:var(--red);transform:rotate(180deg);transition:transform .3s}

/* Filter pills */
.filters{display:flex;gap:6px;padding:10px 16px;background:#fafafa;border-bottom:1px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter{padding:7px 14px;border-radius:20px;background:#fff;border:1px solid var(--line);font-size:13px;font-weight:600;white-space:nowrap;color:var(--charcoal);flex-shrink:0}
.filter.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
.filter .n{display:inline-block;background:#e5e5e5;color:var(--mute);padding:0 6px;border-radius:10px;font-size:11px;margin-left:4px;min-width:18px;text-align:center}
.filter.active .n{background:rgba(255,255,255,.2);color:#fff}
.filter.alert .n{background:var(--red);color:#fff}
.filter.alert.active .n{background:#fff;color:var(--red)}

/* Feed */
.feed{flex:1;overflow-y:auto}
.section-title{padding:16px 18px 8px;font-size:11px;font-weight:800;color:var(--mute);text-transform:uppercase;letter-spacing:1.5px;background:var(--bg);border-bottom:1px solid var(--line)}
.row{background:#fff;border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:flex-start;gap:12px;cursor:pointer;transition:background .1s;position:relative}
.row:active{background:#f8f8f8}
.row.unseen{background:#fff5f5}
.row.unseen::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.row.stale::after{content:'⚠';position:absolute;top:8px;right:12px;color:var(--amber);font-size:14px;font-weight:800}
.row.expanded{background:#fafafa}

.row-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#C8102E,#A00C24);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.row-avatar.booked{background:linear-gradient(135deg,#16a34a,#15803d)}
.row-avatar.lost{background:linear-gradient(135deg,#94a3b8,#64748b)}
.row-avatar.paid::after{content:'💳';position:absolute;margin-top:26px;margin-left:-10px;font-size:12px}

.row-body{flex:1;min-width:0}
.row-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.row-name{font-weight:700;font-size:15px;letter-spacing:-.2px}
.row-time{font-size:12px;color:var(--mute);margin-left:auto;flex-shrink:0}
.row-preview{font-size:13px;color:var(--mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.row-price{color:var(--red);font-weight:800;font-size:14px}
.row-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.3px}
.chip.new{background:#fee2e2;color:#991b1b}
.chip.partial{background:#fef3c7;color:#78350f}
.chip.contacted{background:#ede9fe;color:#6d28d9}
.chip.quoted{background:#cffafe;color:#155e75}
.chip.booked{background:#dcfce7;color:#166534}
.chip.done{background:#f1f5f9;color:#475569}
.chip.lost{background:#fee2e2;color:#991b1b}
.chip.abandoned{background:#fee2e2;color:#991b1b}
.chip.paid{background:#dcfce7;color:#166534}
.chip.es{background:#ede9fe;color:#6d28d9}
.chip.source{background:#fff3e0;color:#78350f;font-family:ui-monospace,monospace}

/* Expanded detail */
.detail{background:#fafafa;border-bottom:1px solid var(--line);padding:18px;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
.detail-hero{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border-radius:14px;padding:18px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.detail-hero .big{font-size:32px;font-weight:900;letter-spacing:-.02em;line-height:1}
.detail-hero .lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;opacity:.8;text-transform:uppercase;margin-bottom:4px}
.detail-hero .meta{text-align:right;font-size:12px;opacity:.9}

.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.btn-big{padding:14px;border-radius:12px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;transition:transform .1s}
.btn-big:active{transform:scale(.97)}
.btn-call{background:var(--green);color:#fff}
.btn-mail{background:var(--blue);color:#fff}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;background:#fff;border-radius:12px;padding:14px;margin-bottom:14px}
.dg-row{font-size:13px;padding:2px 0}
.dg-row .lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mute);margin-bottom:1px}
.dg-row .val{font-weight:600;color:var(--charcoal)}
.dg-row a{color:var(--red)}

.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.status-btn{padding:10px;background:#fff;border:1.5px solid var(--line);border-radius:10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--charcoal);transition:all .1s}
.status-btn:active{transform:scale(.96)}
.status-btn.active{background:var(--red);color:#fff;border-color:var(--red)}

.notes-wrap{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
.notes-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--mute);margin-bottom:10px}
.note{padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px;color:var(--charcoal)}
.note:last-of-type{border:none}
.note-at{font-size:10px;color:var(--mute);margin-bottom:2px}
.note-input{display:flex;gap:6px;margin-top:8px}
.note-input input{flex:1;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:13px}
.note-input button{padding:10px 16px;background:var(--charcoal);color:#fff;border-radius:10px;font-weight:700;font-size:12px}

.timeline-wrap{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;max-height:240px;overflow-y:auto}
.tl-item{padding:5px 0;border-bottom:1px dashed var(--line);font-size:12px}
.tl-item:last-child{border:none}
.tl-item .at{font-size:10px;color:var(--mute);margin-bottom:1px}

/* Empty */
.empty{text-align:center;padding:60px 24px;color:var(--mute)}
.empty .ico{font-size:42px;margin-bottom:10px}
.empty .t{font-size:17px;font-weight:700;color:var(--charcoal);margin-bottom:4px}
.empty .s{font-size:13px}

.loading{text-align:center;padding:40px;color:var(--mute);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <div class="login-logo">Toro <span>Movers</span></div>
    <div class="login-sub">Leads</div>
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password" autofocus>
    <button id="pw-btn">Open</button>
    <div class="err" id="pw-err">Wrong password.</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">
  <header class="hdr">
    <div>
      <div class="hdr-title">Toro <span>Movers</span></div>
      <div class="hdr-meta" id="hdr-meta"></div>
    </div>
    <button class="refresh" id="refresh" aria-label="Refresh">↻</button>
  </header>

  <div class="filters" id="filters">
    <button class="filter active" data-filter="attention">Attention <span class="n" id="n-attn">0</span></button>
    <button class="filter" data-filter="all">All <span class="n" id="n-all">0</span></button>
    <button class="filter" data-filter="new">New <span class="n" id="n-new">0</span></button>
    <button class="filter" data-filter="contacted">Contacted <span class="n" id="n-contacted">0</span></button>
    <button class="filter" data-filter="quoted">Quoted <span class="n" id="n-quoted">0</span></button>
    <button class="filter" data-filter="booked">Booked <span class="n" id="n-booked">0</span></button>
    <button class="filter" data-filter="lost">Lost <span class="n" id="n-lost">0</span></button>
  </div>

  <div class="feed" id="feed">
    <div class="loading">Loading…</div>
  </div>
</div>

<script>
var PW = localStorage.getItem('crm_pw') || '';
var leads = [];
var currentFilter = 'attention';
var expandedId = null;

// ===== LOGIN =====
function showApp(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadLeads();
}
async function tryLogin(pw){
  try {
    var r = await fetch('/.netlify/functions/crm?action=list', { headers: { 'x-crm-password': pw } });
    if (r.ok) { PW = pw; localStorage.setItem('crm_pw', pw); showApp(); }
    else { document.getElementById('pw-err').style.display = 'block'; }
  } catch(e){ alert('Network error'); }
}
document.getElementById('pw-btn').addEventListener('click', function(){
  var pw = document.getElementById('pw-input').value.trim();
  if (pw) tryLogin(pw);
});
document.getElementById('pw-input').addEventListener('keydown', function(e){
  if (e.key === 'Enter') document.getElementById('pw-btn').click();
});
if (PW) tryLogin(PW);

// ===== LOAD =====
async function loadLeads(){
  try {
    var r = await fetch('/.netlify/functions/crm?action=list', { headers: { 'x-crm-password': PW } });
    if (!r.ok) { if (r.status === 401){ localStorage.removeItem('crm_pw'); location.reload(); } return; }
    var j = await r.json();
    leads = j.leads || [];
    updateFilters();
    render();
  } catch(e){ console.error(e); }
}

// ===== FILTERS =====
function updateFilters(){
  var now = Date.now();
  var lastSeen = parseInt(localStorage.getItem('crm_last_seen') || '0', 10);

  function isStale(l){
    var ageH = (now - new Date(l.updatedAt || l.createdAt).getTime()) / 3600000;
    return ageH > 4 && (l.status === 'new' || l.status === 'contacted');
  }
  function isUnseen(l){ return new Date(l.createdAt).getTime() > lastSeen && l.status === 'new'; }
  function isAttention(l){ return isUnseen(l) || isStale(l); }

  document.getElementById('n-attn').textContent = leads.filter(isAttention).length;
  document.getElementById('n-all').textContent = leads.length;
  ['new','contacted','quoted','booked','lost'].forEach(function(s){
    document.getElementById('n-'+s).textContent = leads.filter(l => l.status === s).length;
  });

  var attnCount = leads.filter(isAttention).length;
  var attnFilter = document.querySelector('.filter[data-filter="attention"]');
  attnFilter.classList.toggle('alert', attnCount > 0);

  var today = new Date(); today.setHours(0,0,0,0);
  var newToday = leads.filter(l => new Date(l.createdAt) >= today).length;
  var booked = leads.filter(l => l.status === 'booked').length;
  document.getElementById('hdr-meta').innerHTML =
    '<span class="hdr-stat red">'+newToday+'</span> today · <span class="hdr-stat">'+booked+'</span> booked';

  document.title = (attnCount > 0 ? '('+attnCount+') ' : '') + 'Toro Movers — Leads';
}

document.querySelectorAll('.filter').forEach(function(f){
  f.addEventListener('click', function(){
    document.querySelectorAll('.filter').forEach(x => x.classList.remove('active'));
    f.classList.add('active');
    currentFilter = f.getAttribute('data-filter');
    render();
  });
});
document.getElementById('refresh').addEventListener('click', loadLeads);

// ===== RENDER FEED =====
function render(){
  var feed = document.getElementById('feed');
  var now = Date.now();
  var lastSeen = parseInt(localStorage.getItem('crm_last_seen') || '0', 10);

  function isStale(l){
    var ageH = (now - new Date(l.updatedAt || l.createdAt).getTime()) / 3600000;
    return ageH > 4 && (l.status === 'new' || l.status === 'contacted');
  }
  function isUnseen(l){ return new Date(l.createdAt).getTime() > lastSeen && l.status === 'new'; }

  var list = leads.slice();
  if (currentFilter === 'attention') {
    list = list.filter(l => isUnseen(l) || isStale(l));
  } else if (currentFilter !== 'all') {
    list = list.filter(l => l.status === currentFilter);
  }

  if (!list.length) {
    var msg = currentFilter === 'attention'
      ? { ico:'✨', t:'All caught up!', s:'No leads need attention right now.' }
      : { ico:'📭', t:'No leads here', s:'Check back when new quotes come in.' };
    feed.innerHTML = '<div class="empty"><div class="ico">'+msg.ico+'</div><div class="t">'+msg.t+'</div><div class="s">'+msg.s+'</div></div>';
    return;
  }

  var html = '';
  list.forEach(function(l){
    var initials = (l.name || 'NN').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    var price = l.estimate_total ? '$'+l.estimate_total : '';
    var preview = [
      l.phone,
      l.furniture_size,
      l.zip_from && l.zip_to ? l.zip_from+'→'+l.zip_to : l.zip_from,
    ].filter(Boolean).join(' · ');

    var classes = 'row';
    if (isUnseen(l)) classes += ' unseen';
    if (isStale(l)) classes += ' stale';
    if (expandedId === l.id) classes += ' expanded';

    var avatarClass = l.status === 'booked' ? 'booked' : (l.status === 'lost' ? 'lost' : '');

    html += '<div class="'+classes+'" data-id="'+l.id+'">'+
      '<div class="row-avatar '+avatarClass+'">'+initials+'</div>'+
      '<div class="row-body">'+
        '<div class="row-top">'+
          '<div class="row-name">'+esc(l.name||'(no name)')+'</div>'+
          '<div class="row-time">'+timeAgo(l.createdAt)+'</div>'+
        '</div>'+
        '<div class="row-preview">'+esc(preview)+'</div>'+
        '<div class="row-meta">'+
          (price ? '<span class="row-price">'+price+'</span>' : '')+
          '<span class="chip '+l.status+'">'+esc(l.status)+'</span>'+
          (l.depositPaid ? '<span class="chip paid">💳 paid</span>' : '')+
          ((l.utm_content||'').startsWith('es-') ? '<span class="chip es">🇪🇸</span>' : '')+
          (l.utm_content ? '<span class="chip source">'+esc(l.utm_content)+'</span>' : '')+
        '</div>'+
      '</div>'+
    '</div>';

    if (expandedId === l.id) {
      html += renderDetail(l);
    }
  });

  feed.innerHTML = html;

  feed.querySelectorAll('.row').forEach(function(r){
    r.addEventListener('click', function(){
      var id = r.dataset.id;
      expandedId = (expandedId === id) ? null : id;
      if (expandedId) {
        // Mark as seen
        localStorage.setItem('crm_last_seen', String(Date.now()));
      }
      render();
      if (expandedId) {
        var el = document.querySelector('.row[data-id="'+expandedId+'"]');
        if (el) el.scrollIntoView({ behavior:'smooth', block:'start' });
        loadDetail(expandedId);
      }
    });
  });
}

// ===== DETAIL =====
function renderDetail(l, full){
  // `l` is the summary from list; `full` is the full-detail object (async loaded)
  var lead = full || l;
  var est = lead.estimate || (l.estimate_total ? { total: l.estimate_total } : null);
  var phone = (lead.phone || '').replace(/\D/g,'');

  var heroHtml = est && est.total ? (
    '<div class="detail-hero">'+
      '<div><div class="lbl">Quote</div><div class="big">$'+est.total+'</div></div>'+
      '<div class="meta">'+(est.movers?est.movers+' movers':'')+'<br>'+(est.hours?est.hours+' hours':'')+'</div>'+
    '</div>'
  ) : '';

  var actionsHtml =
    '<div class="detail-actions">'+
      (phone ? '<a class="btn-big btn-call" href="tel:'+phone+'">📞 Call</a>' : '')+
      (lead.email ? '<a class="btn-big btn-mail" href="mailto:'+esc(lead.email)+'">✉️ Email</a>' : '')+
    '</div>';

  var STATUSES = ['new','contacted','quoted','booked','done','lost'];
  var statusHtml = '<div class="status-grid">' + STATUSES.map(function(s){
    return '<button class="status-btn '+(lead.status===s?'active':'')+'" data-status="'+s+'" data-id="'+lead.id+'">'+s+'</button>';
  }).join('') + '</div>';

  var gridHtml = '<div class="detail-grid">'+
    dgRow('Phone', phone ? '<a href="tel:'+phone+'">'+esc(lead.phone)+'</a>' : '—') +
    dgRow('Email', lead.email ? '<a href="mailto:'+esc(lead.email)+'">'+esc(lead.email)+'</a>' : '—') +
    dgRow('From', lead.zip_from || '—') +
    dgRow('To', lead.zip_to || '—') +
    dgRow('Size', lead.furniture_size || '—') +
    dgRow('Floor', lead.floor || '—') +
    dgRow('Access', lead.stairs_elevator || '—') +
    dgRow('Move date', lead.move_date || '—') +
    dgRow('Ad', lead.utm_content || '—') +
  '</div>';

  var notes = lead.notes || [];
  var notesHtml = '<div class="notes-wrap">'+
    '<div class="notes-title">Notes</div>'+
    (notes.length
      ? notes.map(function(n){
          return '<div class="note"><div class="note-at">'+fmtDate(n.at)+'</div>'+esc(n.text)+'</div>';
        }).join('')
      : '<div style="font-size:12px;color:#94a3b8;text-align:center;padding:4px">No notes yet</div>'
    )+
    '<div class="note-input"><input class="note-text" placeholder="Add a note…"><button class="note-save" data-id="'+lead.id+'">Save</button></div>'+
  '</div>';

  var timeline = (lead.timeline || []).slice().reverse();
  var tlHtml = timeline.length ? '<div class="timeline-wrap">' +
    '<div class="notes-title">Timeline</div>' +
    timeline.map(function(t){ return '<div class="tl-item"><div class="at">'+fmtDate(t.at)+'</div>'+esc(t.text)+'</div>'; }).join('') +
  '</div>' : '';

  return '<div class="detail" data-detail="'+lead.id+'">' +
    heroHtml + actionsHtml + statusHtml + gridHtml + notesHtml + tlHtml +
  '</div>';
}
function dgRow(lbl, val){ return '<div class="dg-row"><div class="lbl">'+lbl+'</div><div class="val">'+val+'</div></div>'; }

async function loadDetail(id){
  try {
    var r = await fetch('/.netlify/functions/crm?action=get&id='+id, { headers: { 'x-crm-password': PW } });
    var j = await r.json();
    if (!j.lead) return;
    var el = document.querySelector('.detail[data-detail="'+id+'"]');
    if (el) el.outerHTML = renderDetail(leads.find(l => l.id === id) || j.lead, j.lead);
    wireDetail(id, j.lead);
  } catch(e){}
}

function wireDetail(id, lead){
  document.querySelectorAll('.detail[data-detail="'+id+'"] .status-btn').forEach(function(b){
    b.addEventListener('click', async function(e){
      e.stopPropagation();
      var s = b.dataset.status;
      var r = await fetch('/.netlify/functions/crm', {
        method:'POST', headers: { 'Content-Type':'application/json', 'x-crm-password': PW },
        body: JSON.stringify({ action:'status', id: id, status: s })
      });
      var j = await r.json();
      if (j.lead) { loadLeads(); }
    });
  });
  var saveBtn = document.querySelector('.detail[data-detail="'+id+'"] .note-save');
  if (saveBtn) {
    saveBtn.addEventListener('click', async function(e){
      e.stopPropagation();
      var input = document.querySelector('.detail[data-detail="'+id+'"] .note-text');
      var txt = input.value.trim();
      if (!txt) return;
      var r = await fetch('/.netlify/functions/crm', {
        method:'POST', headers: { 'Content-Type':'application/json', 'x-crm-password': PW },
        body: JSON.stringify({ action:'note', id: id, text: txt })
      });
      var j = await r.json();
      if (j.lead) { input.value=''; loadDetail(id); }
    });
  }
}

// Hash deep-link from Telegram (#lead/xxx)
window.addEventListener('hashchange', handleHash);
function handleHash(){
  var m = location.hash.match(/#lead\/(.+)/);
  if (m && PW) { expandedId = m[1]; loadLeads().then(function(){ loadDetail(m[1]); }); }
}
if (location.hash.startsWith('#lead/')) setTimeout(handleHash, 400);

// ===== HELPERS =====
function esc(s){ return String(s==null?'':s).replace(/[<>"']/g,function(c){return {'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function timeAgo(iso){
  if (!iso) return '';
  var s = Math.floor((Date.now() - new Date(iso).getTime())/1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60)+'m';
  if (s < 86400) return Math.floor(s/3600)+'h';
  if (s < 604800) return Math.floor(s/86400)+'d';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtDate(iso){ return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }

// Auto-refresh every 30s
setInterval(function(){ if (PW && document.getElementById('app').style.display !== 'none') loadLeads(); }, 30000);
</script>
