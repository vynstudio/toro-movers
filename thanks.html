<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Thanks — we'll be in touch · Toro Movers</title>
<meta name="description" content="Thanks for reaching out to Toro Movers. We'll call or text you within the hour to confirm your move.">
<meta name="theme-color" content="#C8102E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<script src="assets/js/tracking.js" defer></script>
<style>
  :root { --red: #C8102E; --charcoal: #1C1C1E; --gray-500: #6B7280; --sand: #FBF6E9; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--sand);
    color: var(--charcoal);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    max-width: 560px;
    background: #fff;
    border-radius: 28px;
    padding: 56px 48px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(28,28,30,0.10);
  }
  .check {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    display: grid;
    place-items: center;
    margin: 0 auto 28px;
  }
  .check svg { width: 36px; height: 36px; }
  h1 {
    font-size: clamp(1.75rem, 4vw, 2.5rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  p {
    color: var(--gray-500);
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .emphasis { color: var(--charcoal); font-weight: 600; }
  .actions {
    margin-top: 32px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-block;
    padding: 14px 28px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
    transition: transform .2s ease;
  }
  .btn-primary { background: var(--red); color: #fff; }
  .btn-outline { background: transparent; color: var(--charcoal); border: 2px solid var(--charcoal); }
  .btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <main class="card">
    <div class="check" aria-hidden="true">
      <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Thanks — we got it.</h1>
    <p>A real human from our crew will <span class="emphasis">call or text you within the hour</span> to confirm the details of your move.</p>
    <p>If you need us sooner, just give us a ring.</p>
    <div class="actions">
      <a href="tel:3217580094" class="btn btn-primary">Call (321) 758-0094</a>
      <a href="/" class="btn btn-outline">Back to site</a>
    </div>
  </main>
  <script>
    // Safety-net Lead event in case the submit handler on / didn't fire
    // (e.g. user refreshes /thanks directly). Uses sessionStorage so we
    // don't double-fire when ToroTrack.lead() already ran on the form page.
    window.addEventListener('load', function () {
      if (sessionStorage.getItem('toro_lead_fired') === '1') {
        sessionStorage.removeItem('toro_lead_fired');
        return;
      }
      if (window.ToroTrack && window.ToroTrack.lead) {
        window.ToroTrack.lead({});
      }
    });
  </script>
</body>
</html>
